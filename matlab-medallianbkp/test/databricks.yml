# This is a Databricks asset bundle definition for test.
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.
bundle:
  name: test
  uuid: bd3880d2-65cf-4567-92e2-db76d6f48a19

include:
  - resources/*.yml

# Variable declarations. These variables are assigned in the dev/prod targets below.
variables:
  catalog:
    description: The catalog to use
  schema:
    description: The schema to use

targets:
  dev:
    # The default target uses 'mode: development' to create a development copy.
    # - Deployed resources get prefixed with '[dev my_user_name]'
    # - Any job schedules and triggers are paused by default.
    # See also https://docs.databricks.com/dev-tools/bundles/deployment-modes.html.
    mode: development
    default: true
    workspace:
      host: https://dbc-9a48285a-c91f.cloud.databricks.com
    variables:
      catalog: Glow
      schema: ${workspace.current_user.short_name}
  prod:
    mode: production
    workspace:
      host: https://dbc-9a48285a-c91f.cloud.databricks.com
      # We explicitly deploy to /Workspace/Users/piyush1991jain@gmail.com to make sure we only have a single copy.
      root_path: /Workspace/Users/piyush1991jain@gmail.com/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: Glow
      schema: prod
    permissions:
      - user_name: piyush1991jain@gmail.com
        level: CAN_MANAGE
